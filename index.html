<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>TX Builder | txid.uk</title>
<meta name="description" content="비트코인 TX 브로드캐스트 · PSBT 디코더 · Raw TX 분석">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="base.css"><link rel="stylesheet" href="style.css">
</head>
<body>
<header><div class="header-inner">
  <a href="https://txid.uk" class="logo">₿ <span>txid</span>.uk</a>
  <nav>
    <a href="https://txid.uk">탐색기</a>
    <a href="https://tools.txid.uk">Tools</a>
    <a href="#" class="active">TX</a>
  </nav>
  <button id="theme-btn" onclick="toggleTheme()">🌙</button>
</div></header>

<main>
  <div class="hero">
    <h1>TX <span class="accent">Builder</span></h1>
    <p class="hero-sub">Raw Transaction 분석 · PSBT 디코더 · 네트워크 브로드캐스트</p>
  </div>

  <div class="content">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('broadcast','broadcast-panel')">📤 브로드캐스트</button>
      <button class="tab" onclick="switchTab('decode','decode-panel')">🔍 Raw TX 디코드</button>
      <button class="tab" onclick="switchTab('lookup','lookup-panel')">🔎 TX 조회</button>
    </div>

    <div id="broadcast-panel" class="panel">
      <div class="panel-desc">서명된 Raw 트랜잭션을 비트코인 메인넷에 브로드캐스트합니다.</div>
      <div class="warning-box">⚠️ 브로드캐스트 후에는 취소할 수 없습니다. 반드시 확인 후 전송하세요.</div>
      <textarea id="raw-tx" class="input textarea" rows="6" placeholder="서명된 트랜잭션 hex 붙여넣기&#10;예: 02000000..."></textarea>
      <div class="action-row">
        <button class="btn" onclick="decodeTx(false)">🔍 먼저 확인</button>
        <button class="btn danger" onclick="broadcastTx()">📤 브로드캐스트</button>
        <button class="btn secondary" onclick="clearTx()">지우기</button>
      </div>
      <div id="decode-preview" class="result-box" style="display:none"></div>
      <div id="broadcast-result" class="result-box" style="display:none"></div>
    </div>

    <div id="decode-panel" class="panel" style="display:none">
      <div class="panel-desc">Raw TX hex를 파싱하여 입출력 상세 정보를 표시합니다.</div>
      <textarea id="decode-tx" class="input textarea" rows="6" placeholder="Raw TX hex 입력"></textarea>
      <button class="btn" onclick="decodeTx(true)">디코드</button>
      <div id="decode-result" class="result-box" style="display:none"></div>
    </div>

    <div id="lookup-panel" class="panel" style="display:none">
      <div class="panel-desc">TXID로 네트워크에서 트랜잭션을 조회합니다.</div>
      <div class="search-row">
        <input id="txid-input" class="input" placeholder="TXID 64자 hex 입력" spellcheck="false">
        <button class="btn" onclick="lookupTx()">조회</button>
      </div>
      <div id="lookup-result" class="result-box" style="display:none"></div>
    </div>

    <div class="fee-estimator card" style="margin-top:20px">
      <div class="section-title">💰 현재 추천 수수료</div>
      <div id="fee-grid" class="fee-grid"></div>
    </div>
  </div>
</main>

<footer><div class="footer-inner"><span>© 2025 txid.uk</span><span>mempool.space API</span></div></footer>
<script src="app.js"></script>
</body></html>
